# SPDX-License-Identifier: AGPL-3.0-or-later
# TabbyEQ CI — configure, build, and run the JUCE-free teq DSP unit tests (the cramping +
# engine correctness gate). No JUCE fetch needed: the teq core is framework-agnostic std C++20.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target teq_tests -j

      - name: Test
        run: |
          bin="$(find build -type f -name teq_tests -perm -u+x | head -1)"
          echo "running $bin"
          "$bin"
