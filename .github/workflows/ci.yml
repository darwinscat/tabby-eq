# TabbyEQ CI — the DSP core now lives in felitronics-core, consumed via FetchContent. This job
# configures with the plugin OFF (so JUCE is NOT fetched), which pulls the pinned core release and
# builds its JUCE-free self-tests, then runs them through ctest. That gates the whole consumption
# path (the fetch + the engine-correctness suites) on every push/PR, std C++20, no external deps.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5   # v5 runs on Node 24 (v4 pins the deprecated Node 20)

      - name: Configure (fetches felitronics-core; plugin OFF → no JUCE)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DTABBYEQ_BUILD_PLUGIN=OFF

      - name: Build the core self-tests
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
