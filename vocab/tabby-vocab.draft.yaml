# TabbyEQ — vocabulary (DRAFT, all 6 v1 sources)
# Schema + maps drafted 2026-06-26 via DeepSeek+Codex panel + human verdict.
# Gemini pending (agy backend not yet wired). NOT frozen.
# Freeze as vocab-v1.yaml before release (becomes an external contract).
#
# Structure:
#   traits:   global dictionary of CONCEPTS (what a trait means + default behaviour)
#   sources:  per-source MAP OVERRIDES only (freq center, range, Q, action, search)
#
# Field semantics:
#   type      hpf | lpf | bell | low_shelf | high_shelf
#   freq      nominal center (Hz). For search traits it's the sweep start.
#   range     [min, max] safe zone (Hz). For search traits = the zoom/sweep window.
#   slope     HPF/LPF only: 12 | 24 (dB/oct), user-switchable
#   Q         treatment Q for fixed bells/shelves
#   searchQ   narrow Q used while hunting; its PRESENCE marks the trait as search-mode
#   treatQ    musical Q applied after "found"
#   action    cut | boost | either   (default polarity of the amount knob)
#   tier      core | opt             (opt = behind a "more" reveal)
# Per-source searchQ/treatQ overrides the global `find` hint.

traits:
  rumble:    { concept: "гул/субниз",            type: hpf,        find: false }
  sub:       { concept: "саб/глубина",            type: low_shelf,  find: false }
  weight:    { concept: "основа/вес ноты",        type: bell,       find: false }
  body:      { concept: "тело/тепло",             type: low_shelf,  find: false }
  boom:      { concept: "бубнёж деки/резонанс",   type: bell,       find: true  }
  mud:       { concept: "муть/картон",            type: bell,       find: false }
  boxy:      { concept: "коробка/каб-резонанс",   type: bell,       find: true  }
  chunk:     { concept: "чанк/палм-мьют",         type: bell,       find: true  }
  growl:     { concept: "рык/вуди-грайнд",        type: bell,       find: true  }
  nose:      { concept: "нос/гнусавость",         type: bell,       find: true  }
  pick:      { concept: "атака медиатора/щелчок", type: bell,       find: true  }
  bite:      { concept: "разборчивость/бит",      type: bell,       find: false }
  presence:  { concept: "presence/атака",         type: bell,       find: false }
  harsh:     { concept: "жёсткость/глэр",         type: bell,       find: true  }
  icepick:   { concept: "ice-pick/игла",          type: bell,       find: true  }
  clank:     { concept: "клац струны/лад",        type: bell,       find: true  }
  sibilance: { concept: "сибилянты/эс",           type: bell,       find: true  }
  squeak:    { concept: "скрип/шум струн-ладов",  type: bell,       find: true  }
  fizz:      { concept: "fizz/жужжание",          type: bell,       find: true  }
  sparkle:   { concept: "блеск/звон верх-серед",  type: bell,       find: false }
  cabtop:    { concept: "верх каба (срез)",       type: lpf,        find: false }
  air:       { concept: "воздух/открытость",      type: high_shelf, find: false }

