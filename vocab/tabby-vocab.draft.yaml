      boxy:      { freq: 500,   range: [350, 700],    Q: 1.4,    action: cut,   tier: opt  }
      nose:      { freq: 1000,  range: [800, 1800],   searchQ: 6, treatQ: 2.5,  action: cut, tier: core }
      presence:  { freq: 3000,  range: [2500, 5000],  Q: 0.8,    action: boost, tier: core }
